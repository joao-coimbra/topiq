name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Create dist zip
        run: zip -r topiq-${{ github.ref_name }}.zip dist/

      - name: Get tag message and previous tag
        id: tag_message
        run: |
          DELIMITER=$(openssl rand -hex 16)
          echo "body<<${DELIMITER}" >> "$GITHUB_OUTPUT"
          # Only emit the tag body when it is an annotated tag; lightweight tags
          # have no stored message and %(contents) falls back to the commit message.
          if git cat-file -t "${{ github.ref_name }}" 2>/dev/null | grep -q "^tag$"; then
            git tag -l --format='%(contents)' "${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
          echo "${DELIMITER}" >> "$GITHUB_OUTPUT"

          PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          echo "previous_tag=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.tag_message.outputs.body }}
          generate_release_notes: true
          previous_tag_name: ${{ steps.tag_message.outputs.previous_tag }}
          files: topiq-${{ github.ref_name }}.zip
