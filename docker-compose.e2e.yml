services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: topiq-mqtt-e2e
    ports:
      - "1883:1883"
    volumes:
      - ./test/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "healthcheck", "-m", "ok", "-q", "0"]
      interval: 2s
      timeout: 5s
      retries: 5
